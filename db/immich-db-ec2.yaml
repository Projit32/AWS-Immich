AWSTemplateFormatVersion: '2010-09-09'
Description: Immich PostgreSQL Launch Templates

Parameters:

  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

  VpcId:
    Type: AWS::EC2::VPC::Id

  AllowedCIDR:
    Type: String
    Default: 10.0.0.0/8
    Description: >
      CIDR allowed to reach Postgres port 5432 and SSH. Use your VPC CIDR.

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues:
      - t4g.micro
      - t4g.small
      - t4g.medium
      - t4g.large

  CredentialSSMName:
    Type: String
    Default: /immich/conf/db

  ImmichPostgresVersion:
    Type: String
    Default: 'release'
    Description: >
      Tag of ghcr.io/immich-app/postgres to pull.
      Use 'release' for latest stable, or pin to a specific tag e.g. v0.2.0.

Resources:

  ###########################################################
  # Security Group
  ###########################################################

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Immich DB - Postgres and SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref AllowedCIDR
          Description: Postgres from VPC
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCIDR
          Description: SSH access
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound (Docker pull, SSM, ECR, etc.)
      Tags:
        - Key: Name
          Value: !Sub immich-db-sg-${Environment}

  ###########################################################
  # IAM
  ###########################################################

  DbRole:
    Type: AWS::IAM::Role
    Properties:

      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

      Policies:
        - PolicyName: postgres-ssm-read

          PolicyDocument:
            Version: '2012-10-17'

            Statement:
              - Effect: Allow

                Action:
                  - ssm:GetParameter

                Resource: !Sub
                  - arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SSMPath}
                  - SSMPath: !Ref CredentialSSMName

  DbInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref DbRole

  ###########################################################
  # State Parameter
  ###########################################################

  StateParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /immich/conf/db/state
      Type: String
      Value: |
        {
          "state":"SPOT_ACTIVE",
        }

  ###########################################################
  # Spot Launch Template
  ###########################################################

  SpotLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate

    Properties:

      LaunchTemplateName:
        !Sub immich-db-spot-${Environment}

      LaunchTemplateData:

        ImageId: !Sub '{{resolve:ssm:/aws/service/ecs/optimized-ami/amazon-linux-2023/arm64/recommended/image_id}}'

        InstanceType: !Ref InstanceType

        IamInstanceProfile:
          Arn: !GetAtt DbInstanceProfile.Arn

        SecurityGroupIds:
          - !Ref DbSecurityGroup

        MetadataOptions:
          HttpTokens: required

        InstanceMarketOptions:
          MarketType: spot

        TagSpecifications:

          - ResourceType: instance

            Tags:
              - Key: Name
                Value: !Sub immich-db-spot-${Environment}

              - Key: Role
                Value: postgres

              - Key: Type
                Value: spot

              - Key: Application
                Value: immich

              - Key: Environment
                Value: !Ref Environment

        UserData:
          Fn::Base64:
            !Sub |
              #!/bin/bash
              set -euo pipefail

              exec > >(tee /var/log/immich-db-init.log | logger -t immich-db-init) 2>&1

              echo "Waiting for EBS attachment..."

              # ── 1. Wait for EBS volume to be attached ──────────────────────────
              DEV="/dev/xvdbb"
              while true; do
                if [ -b "$DEV" ]; then
                  echo "Found EBS volume: $DEV"
                  break
                fi
                sleep 5
              done
              
              
              
              # ── 2. Format only if the volume has no filesystem (new volume) ────

              FS_TYPE=$(blkid -o value -s TYPE "$DEV" || true)

              if [ -z "$FS_TYPE" ]; then
                mkfs.ext4 -L immich-db "$DEV"
              else
                echo "Existing filesystem ($FS_TYPE) — skipping format, data preserved"
              fi



              # ── 3. Mount and persist via fstab ─────────────────────────────────
              mkdir -p /data/postgres

              mount "$DEV" /data/postgres

              UUID=$(blkid -s UUID -o value "$DEV")

              grep -q "$UUID" /etc/fstab || \
              echo "UUID=$UUID /data/postgres ext4 defaults,nofail 0 2" >> /etc/fstab
              
              # Immich postgres image runs as uid 999
              mkdir -p /data/postgres/data
              chown -R 999:999 /data/postgres



              # ── 4. Parse credentials from SSM ──────────────────────────────────
              # SSM value format: user=username,password=password,db=immich_db
              SSM_VALUE=$(aws ssm get-parameter \
                --name ${CredentialSSMName} \
                --with-decryption \
                --query "Parameter.Value" \
                --output text)

              DB_USER=$(echo "$SSM_VALUE" | tr ',' '\n' | grep '^user=' | cut -d= -f2)
              DB_PASS=$(echo "$SSM_VALUE" | tr ',' '\n' | grep '^password=' | cut -d= -f2)
              DB_NAME=$(echo "$SSM_VALUE" | tr ',' '\n' | grep '^db=' | cut -d= -f2)
            
              if [ -z "$DB_USER" ] || [ -z "$DB_PASS" ] || [ -z "$DB_NAME" ]; then
                echo "ERROR: Failed to parse one or more credentials from SSM value."
                echo "Expected format: user=x,password=y,db=z"
                exit 1
              fi

              echo "Parsed credentials — user=$DB_USER, db=$DB_NAME"
            
            
              # ── 5. Pull Immich Postgres image ──────────────────────────────────
              echo "Pulling docker file"
              docker pull ghcr.io/immich-app/postgres:${ImmichPostgresVersion}
            
              # ── 6. Systemd service for lifecycle management ────────────────────────────────────────

              cat >/etc/systemd/system/immich-db.service <<EOF
              [Unit]
              Description=Immich PostgreSQL
              Requires=docker.service
              After=docker.service network-online.target

              [Service]
              Type=simple
              Restart=always
              RestartSec=10

              ExecStartPre=-/usr/bin/docker rm -f immich-postgres

              ExecStart=/usr/bin/docker run \
                --name immich-postgres \
                --restart=no \
                -p 5432:5432 \
                -e POSTGRES_USER="$DB_USER" \
                -e POSTGRES_PASSWORD="$DB_PASS" \
                -e POSTGRES_DB="$DB_NAME" \
                -v /data/postgres/data:/var/lib/postgresql/data \
                ghcr.io/immich-app/postgres:${ImmichPostgresVersion}

              ExecStop=/usr/bin/docker stop -t 60 immich-postgres
              ExecStopPost=/usr/bin/sync
              ExecStopPost=-/usr/bin/docker rm -f immich-postgres

              [Install]
              WantedBy=multi-user.target
              EOF

              systemctl daemon-reload
              systemctl enable immich-db.service
              systemctl start immich-db.service
              echo "INIT Success"

  ###########################################################
  # OnDemand Launch Template
  ###########################################################

  OnDemandLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate

    Properties:

      LaunchTemplateName:
        !Sub immich-db-od-${Environment}

      LaunchTemplateData:

        ImageId: !Sub '{{resolve:ssm:/aws/service/ecs/optimized-ami/amazon-linux-2023/arm64/recommended/image_id}}'

        InstanceType: !Ref InstanceType

        IamInstanceProfile:
          Arn: !GetAtt DbInstanceProfile.Arn

        SecurityGroupIds:
          - !Ref DbSecurityGroup

        MetadataOptions:
          HttpTokens: required

        TagSpecifications:

          - ResourceType: instance

            Tags:
              - Key: Name
                Value: !Sub immich-db-od-${Environment}

              - Key: Role
                Value: postgres

              - Key: Type
                Value: ondemand

              - Key: Application
                Value: immich

              - Key: Environment
                Value: !Ref Environment

        UserData:
          Fn::Base64:
            !Sub |
              #!/bin/bash
              set -euo pipefail

              exec > >(tee /var/log/immich-db-init.log | logger -t immich-db-init) 2>&1

              echo "Waiting for EBS attachment..."

              # ── 1. Wait for EBS volume to be attached ──────────────────────────
              DEV="/dev/xvdbb"
              while true; do
                if [ -b "$DEV" ]; then
                  echo "Found EBS volume: $DEV"
                  break
                fi
                sleep 5
              done
              
              
              
              # ── 2. Format only if the volume has no filesystem (new volume) ────

              FS_TYPE=$(blkid -o value -s TYPE "$DEV" || true)

              if [ -z "$FS_TYPE" ]; then
                mkfs.ext4 -L immich-db "$DEV"
              else
                echo "Existing filesystem ($FS_TYPE) — skipping format, data preserved"
              fi



              # ── 3. Mount and persist via fstab ─────────────────────────────────
              mkdir -p /data/postgres

              mount "$DEV" /data/postgres

              UUID=$(blkid -s UUID -o value "$DEV")

              grep -q "$UUID" /etc/fstab || \
              echo "UUID=$UUID /data/postgres ext4 defaults,nofail 0 2" >> /etc/fstab
              
              # Immich postgres image runs as uid 999
              mkdir -p /data/postgres/data
              chown -R 999:999 /data/postgres



              # ── 4. Parse credentials from SSM ──────────────────────────────────
              # SSM value format: user=username,password=password,db=immich_db
              SSM_VALUE=$(aws ssm get-parameter \
                --name ${CredentialSSMName} \
                --with-decryption \
                --query "Parameter.Value" \
                --output text)

              DB_USER=$(echo "$SSM_VALUE" | tr ',' '\n' | grep '^user=' | cut -d= -f2)
              DB_PASS=$(echo "$SSM_VALUE" | tr ',' '\n' | grep '^password=' | cut -d= -f2)
              DB_NAME=$(echo "$SSM_VALUE" | tr ',' '\n' | grep '^db=' | cut -d= -f2)
            
              if [ -z "$DB_USER" ] || [ -z "$DB_PASS" ] || [ -z "$DB_NAME" ]; then
                echo "ERROR: Failed to parse one or more credentials from SSM value."
                echo "Expected format: user=x,password=y,db=z"
                exit 1
              fi

              echo "Parsed credentials — user=$DB_USER, db=$DB_NAME"
            
            
              # ── 5. Pull Immich Postgres image ──────────────────────────────────
              echo "Pulling docker file"
              docker pull ghcr.io/immich-app/postgres:${ImmichPostgresVersion}
            
              # ── 6. Systemd service for lifecycle management ────────────────────────────────────────

              cat >/etc/systemd/system/immich-db.service <<EOF
              [Unit]
              Description=Immich PostgreSQL
              Requires=docker.service
              After=docker.service network-online.target

              [Service]
              Type=simple
              Restart=always
              RestartSec=10

              ExecStartPre=-/usr/bin/docker rm -f immich-postgres

              ExecStart=/usr/bin/docker run \
                --name immich-postgres \
                --restart=no \
                -p 5432:5432 \
                -e POSTGRES_USER="$DB_USER" \
                -e POSTGRES_PASSWORD="$DB_PASS" \
                -e POSTGRES_DB="$DB_NAME" \
                -v /data/postgres/data:/var/lib/postgresql/data \
                ghcr.io/immich-app/postgres:${ImmichPostgresVersion}

              ExecStop=/usr/bin/docker stop -t 60 immich-postgres
              ExecStopPost=/usr/bin/sync
              ExecStopPost=-/usr/bin/docker rm -f immich-postgres

              [Install]
              WantedBy=multi-user.target
              EOF

              systemctl daemon-reload
              systemctl enable immich-db.service
              systemctl start immich-db.service
              echo "INIT Success"