version = 0.1

# ── Supporting Resource Stack ────────────────────────────────────────────────────────────
[sr.deploy.parameters]
stack_name        = "immich-supporting-resources"
template_file     = "immich-sr-ec2.yaml"
region            = "us-east-1"
capabilities      = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
fail_on_empty_changeset = false

parameter_overrides = [
  "VpcId=vpc-02cab24e4cec51cb5",
  "SubnetId=subnet-0f05fbb3404eabb19",
  "InstanceType=t4g.medium",
  "AllowedCIDR=0.0.0.0/0",
]

tags = [
  "Project=immich"
]

# ── App Stack ────────────────────────────────────────────────────────────
[app.deploy.parameters]
stack_name        = "immich-cluster"
template_file     = "immich-ecs-v2-prod.yaml"
region            = "us-east-1"
capabilities      = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
fail_on_empty_changeset = false

parameter_overrides = [
  "VpcId=vpc-02cab24e4cec51cb5",
  "SubnetIds=subnet-017bae2cb00a4e949",
  "S3FilesystemId=fs-0b92c011139b425b8",
  "S3FilesSGId=sg-04e9b4071da31c86e",
  "EnvFileS3Arn=arn:aws:s3:::immich-conf-us-east-1-704678691702/immich.env",
  "KeyPairName=Test",
  "ImageLocationS3Uri=s3://immich-conf-us-east-1-704678691702/images"
]

tags = [
  "Project=immich"
]