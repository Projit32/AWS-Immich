
AWSTemplateFormatVersion: '2010-09-09'
Description: Immich ECS Production V2 - API and Worker Spot Capacity Providers

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>

  S3FilesystemId:
    Type: String

  S3FilesSGId:
    Type: String
    Description: >
      Security group of the S3 Files mount targets (exported from storage
      stack as immich-storage-prod-S3FilesSGId). An ingress rule on
      port 2049 (NFS) will be added to this SG from the app instance SG.

  EnvFileS3Arn:
    Type: String

  HostName:
    Type: String

  AllowedCIDR:
    Type: String
    Default: 10.0.0.0/8
    Description: >
      CIDR allowed to reach Postgres port 5432 and SSH. Use your VPC CIDR.

Resources:

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: immich-cluster

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/immich-api
      RetentionInDays: 5

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/immich-microservices
      RetentionInDays: 5

  HostSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Immich ECS Hosts
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2283
          ToPort: 2283
          CidrIp: !Ref AllowedCIDR
          Description: Allow connection to APP

  S3FilesIngressRule:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref S3FilesSGId
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      SourceSecurityGroupId: !Ref HostSecurityGroup
      Description: S3 NFS access from immich

  ECSInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonS3FilesClientFullAccess


  ECSInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ECSInstanceRole

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: EnvFileRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: "*"

  ApiLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        IamInstanceProfile:
          Arn: !GetAtt ECSInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref HostSecurityGroup
        ImageId: "{{resolve:ssm:/aws/service/ecs/optimized-ami/amazon-linux-2023/arm64/recommended/image_id}}"
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            exec > >(tee /var/log/immich-ecs-init.log | logger -t immich-ecs-init) 2>&1
            echo ECS_CLUSTER=${ECSCluster} >> /etc/ecs/ecs.config
            mkdir -p /mnt/immich
            if ! mountpoint -q /mnt/immich; then
              mount -t s3files ${S3FilesystemId}:/ /mnt/immich
              echo "Mounted ${S3FilesystemId} to /mnt/immich"
            fi
            if ! grep -q "${S3FilesystemId}" /etc/fstab; then
              echo "${S3FilesystemId}:/ /mnt/immich s3files _netdev,nofail 0 0" >> /etc/fstab
              echo "Added ${S3FilesystemId} to /etc/fstab"
            fi

  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        IamInstanceProfile:
          Arn: !GetAtt ECSInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref HostSecurityGroup
        ImageId: "{{resolve:ssm:/aws/service/ecs/optimized-ami/amazon-linux-2023/arm64/recommended/image_id}}"
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            exec > >(tee /var/log/immich-ecs-init.log | logger -t immich-ecs-init) 2>&1
            echo ECS_CLUSTER=${ECSCluster} >> /etc/ecs/ecs.config
            mkdir -p /mnt/immich
            if ! mountpoint -q /mnt/immich; then
              mount -t s3files ${S3FilesystemId}:/ /mnt/immich
              echo "Mounted ${S3FilesystemId} to /mnt/immich"
            fi
            if ! grep -q "${S3FilesystemId}" /etc/fstab; then
              echo "${S3FilesystemId}:/ /mnt/immich s3files _netdev,nofail 0 0" >> /etc/fstab
              echo "Added ${S3FilesystemId} to /etc/fstab"
            fi

  ApiASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: "0"
      MaxSize: "3"
      DesiredCapacity: "0"
      VPCZoneIdentifier: !Ref SubnetIds
      NewInstancesProtectedFromScaleIn: true
      MixedInstancesPolicy:
        InstancesDistribution:
          OnDemandPercentageAboveBaseCapacity: 0
          SpotAllocationStrategy: price-capacity-optimized
        LaunchTemplate:
          LaunchTemplateSpecification:
            LaunchTemplateId: !Ref ApiLaunchTemplate
            Version: !GetAtt ApiLaunchTemplate.LatestVersionNumber
          Overrides:
            - InstanceType: t4g.micro
            - InstanceType: t4g.small

  WorkerASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: "0"
      MaxSize: "3"
      DesiredCapacity: "0"
      VPCZoneIdentifier: !Ref SubnetIds
      NewInstancesProtectedFromScaleIn: true
      MixedInstancesPolicy:
        InstancesDistribution:
          OnDemandPercentageAboveBaseCapacity: 0
          SpotAllocationStrategy: price-capacity-optimized
        LaunchTemplate:
          LaunchTemplateSpecification:
            LaunchTemplateId: !Ref WorkerLaunchTemplate
            Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber
          Overrides:
            - InstanceType: c6g.large
            - InstanceType: c7g.large
            - InstanceType: c8g.large
            - InstanceType: t4g.medium

  ApiCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      AutoScalingGroupProvider:
        ManagedTerminationProtection: ENABLED
        AutoScalingGroupArn: !Ref ApiASG
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
          MinimumScalingStepSize: 1
          MaximumScalingStepSize: 1

  WorkerCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      AutoScalingGroupProvider:
        ManagedTerminationProtection: ENABLED
        AutoScalingGroupArn: !Ref WorkerASG
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
          MinimumScalingStepSize: 1
          MaximumScalingStepSize: 1

  ClusterCapacityProviders:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref ECSCluster
      DefaultCapacityProviderStrategy:
        - CapacityProvider: !Ref ApiCapacityProvider
          Weight: 1
          Base: 0
      CapacityProviders:
        - !Ref ApiCapacityProvider
        - !Ref WorkerCapacityProvider

  ApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: immich-api
      NetworkMode: bridge  # Changed from awsvpc
      RequiresCompatibilities: [EC2]
      Cpu: 2048
      Memory: 756
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      Volumes:
        - Name: uploads
          Host:
            SourcePath: /mnt/immich/upload
      ContainerDefinitions:
        - Name: immich-api
          Image: ghcr.io/immich-app/immich-server:release
          Essential: true
          Cpu: 2048
          Memory: 756
          DockerLabels:
            traefik.enable: "true"
            traefik.http.routers.immich-api.rule: !Sub "Host(`${HostName}`)"
            traefik.http.routers.immich-api.entrypoints: "web"
            traefik.http.services.immich-api.loadbalancer.server.port: "2283"
          EnvironmentFiles:
            - Type: s3
              Value: !Ref EnvFileS3Arn
          Environment:
            - Name: IMMICH_WORKERS_INCLUDE
              Value: api
          PortMappings:
            - ContainerPort: 2283
              HostPort: 2283
          MountPoints:
            - SourceVolume: uploads
              ContainerPath: /usr/src/app/upload
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/immich-api
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: immich-microservices
      NetworkMode: bridge  # Changed from awsvpc
      RequiresCompatibilities: [EC2]
      Cpu: 2048
      Memory: 3584
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      Volumes:
        - Name: uploads
          Host:
            SourcePath: /mnt/immich/upload
      ContainerDefinitions:
        - Name: immich-microservices
          Image: ghcr.io/immich-app/immich-server:release
          Essential: true
          Cpu: 2048
          Memory: 3584
          EnvironmentFiles:
            - Type: s3
              Value: !Ref EnvFileS3Arn
          Environment:
            - Name: IMMICH_WORKERS_EXCLUDE
              Value: api
          MountPoints:
            - SourceVolume: uploads
              ContainerPath: /usr/src/app/upload
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/immich-microservices
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  ApiService:
    Type: AWS::ECS::Service
    DependsOn:
      - ClusterCapacityProviders
    Properties:
      Cluster: !Ref ECSCluster
      ServiceName: "immich-api-service"
      DesiredCount: 0
      AvailabilityZoneRebalancing: DISABLED
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 100
      CapacityProviderStrategy:
        - CapacityProvider: !Ref ApiCapacityProvider
          Weight: 1
      TaskDefinition: !Ref ApiTaskDefinition
      # NetworkConfiguration removed (not supported in bridge mode)

  WorkerService:
    Type: AWS::ECS::Service
    DependsOn:
      - ClusterCapacityProviders
    Properties:
      ServiceName: "immich-worker-service"
      Cluster: !Ref ECSCluster
      DesiredCount: 0
      AvailabilityZoneRebalancing: DISABLED
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 100
      CapacityProviderStrategy:
        - CapacityProvider: !Ref WorkerCapacityProvider
          Weight: 1
      TaskDefinition: !Ref WorkerTaskDefinition
      # NetworkConfiguration removed (not supported in bridge mode)

Outputs:
  ClusterName:
    Value: !Ref ECSCluster

  ApiServiceName:
    Value: !Ref ApiService

  WorkerServiceName:
    Value: !Ref WorkerService