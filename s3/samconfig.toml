version = 0.1
# ── Storage Stack ─────────────────────────────────────────────────────────────
[storage.deploy.parameters]
stack_name        = "immich-storage-prod"
template_file     = "immich-storage.yaml"
region            = "us-east-1"
capabilities      = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
fail_on_empty_changeset = false

parameter_overrides = [
  "VpcId=vpc-0ba8dc166b641aa2b",
  "SubnetIds=subnet-05827c47b9a6e2a13,subnet-0dd2c88b406bab802",
  "BucketName=immich-media-prod",
  "IntelligentTieringDays=60",
  "Environment=prod"
]

tags = [
  "Project=immich",
  "Environment=prod",
  "ManagedBy=sam"
]
