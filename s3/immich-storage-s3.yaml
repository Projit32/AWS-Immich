AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Immich Storage - S3 bucket with Intelligent-Tiering lifecycle policy,
  an IAM role for S3 Files access, and an S3 Files filesystem with mount
  targets in each provided subnet. The FilesystemId output is what you
  pass as S3FilesystemId in the app EC2 stack.

Parameters:

  # ── Networking ─────────────────────────────────────────────────────────────
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the S3 Files mount targets will be created.

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: >
      Subnets for S3 Files mount targets.

  # ── Bucket ─────────────────────────────────────────────────────────────────
  BucketName:
    Type: String
    Description: >
      Globally unique S3 bucket name e.g. immich-media-yourname-prod.
      Lowercase, 3-63 chars, no underscores.

  # ── Lifecycle ──────────────────────────────────────────────────────────────
  IntelligentTieringDays:
    Type: Number
    Default: 90
    MinValue: 1
    Description: >
      Days after which original photos/videos transition to Intelligent-Tiering.
      Objects under 128KB are excluded to avoid minimum size charges.

Resources:

  # ── S3 Bucket ──────────────────────────────────────────────────────────────
  ImmichBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${BucketName}-${AWS::Region}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          # Transition original assets (large files) to Intelligent-Tiering
          # Scope to upload/library/ only — thumbnails stay in Standard
          - Id: IntelligentTieringOriginals
            Status: Enabled
            Prefix: upload/library/
            Transitions:
              - TransitionInDays: !Ref IntelligentTieringDays
                StorageClass: INTELLIGENT_TIERING
          # Clean up failed multipart uploads automatically
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 3
      Tags:
        - Key: Name
          Value: !Sub immich-media-s3

  # ── IAM Role for S3 Files ──────────────────────────────────────────────────
  # S3 Files requires an IAM role to access the bucket on behalf of the filesystem.
  S3FilesRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub immich-s3files-role-${AWS::AccountId}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: elasticfilesystem.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3FilesAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject*
                  - s3:PutObject*
                  - s3:DeleteObject*
                  - s3:List*
                  - s3:GetBucketLocation
                  - s3:AbortMultipartUpload
                  - s3:ListBucketVersions"
                  - s3:ListMultipartUploadParts
                  - kms:GenerateDataKey
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:ReEncryptFrom
                  - kms:ReEncryptTo
                Resource:
                  - !GetAtt ImmichBucket.Arn
                  - !Sub ${ImmichBucket.Arn}/*
              - Effect: Allow
                Action:
                  - "events:DeleteRule"
                  - "events:DisableRule"
                  - "events:EnableRule"
                  - "events:PutRule"
                  - "events:PutTargets"
                  - "events:RemoveTargets"
                Resource:
                  - "arn:aws:events:*:*:rule/DO-NOT-DELETE-S3-Files*"
              - Effect: Allow
                Action:
                  - "events:DescribeRule"
                  - "events:ListRuleNamesByTarget"
                  - "events:ListRules"
                  - "events:ListTargetsByRule"
                Resource:
                  - "arn:aws:events:*:*:rule/*"

  # ── S3 Files Security Group ────────────────────────────────────────────────
  S3FilesSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Immich S3 Files - NFS ingress managed by app EC2 stacks
      VpcId: !Ref VpcId
      SecurityGroupIngress: []   # Ingress rules injected by app EC2 stacks
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub immich-s3files-sg

  # ── S3 Files Filesystem ────────────────────────────────────────────────────
  ImmichFilesystem:
    Type: AWS::S3Files::FileSystem
    DependsOn: ImmichBucket
    Properties:
      Bucket: !GetAtt ImmichBucket.Arn   # Must be ARN not bucket name
      RoleArn: !GetAtt S3FilesRole.Arn
      AcceptBucketWarning: true           # Required acknowledgement
      SynchronizationConfiguration:
        ExpirationDataRules:
          - DaysAfterLastAccess: 5
        ImportDataRules:
          - Prefix: ""
            SizeLessThan: 131072
            Trigger: ON_DIRECTORY_FIRST_ACCESS
      Tags:
        - Key: Name
          Value: !Sub immich-fs


  # ── Mount Target ─────────────────────────────────────────────────────
  MountTarget0:
    Type: AWS::S3Files::MountTarget
    Properties:
      FileSystemId: !Ref ImmichFilesystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref S3FilesSG


Outputs:

  BucketName:
    Description: S3 bucket name
    Value: !Ref ImmichBucket


  BucketArn:
    Description: S3 bucket ARN
    Value: !GetAtt ImmichBucket.Arn


  FilesystemId:
    Description: >
      S3 Files filesystem ID — pass this as S3FilesystemId in the app EC2 stack.
    Value: !Ref ImmichFilesystem


  S3FilesSGId:
    Description: S3 Files mount target security group ID
    Value: !Ref S3FilesSG


  S3FilesRoleArn:
    Description: IAM role ARN used by S3 Files to access the bucket
    Value: !GetAtt S3FilesRole.Arn

