version = 0.1

# ── Cache Stack ───────────────────────────────────────────────────────────────
[cache.deploy.parameters]
stack_name        = "immich-cache-prod"
template_file     = "immich-cache-valkey.yaml"
region            = "us-east-1"
capabilities      = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
fail_on_empty_changeset = false

parameter_overrides = [
  "VpcId=vpc-0ba8dc166b641aa2b",
  "SubnetIds=subnet-05827c47b9a6e2a13,subnet-0dd2c88b406bab802",  # two subnets in different AZs
  "NodeType=cache.t4g.micro",
  "Environment=prod"
]

tags = [
  "Project=immich",
  "Environment=prod",
  "ManagedBy=sam"
]
