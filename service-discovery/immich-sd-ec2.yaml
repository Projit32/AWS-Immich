AWSTemplateFormatVersion: '2010-09-09'
Description: Immich Valkey Traefik EC2 Instance with CloudFront CDN & SSL Security

Parameters:

  InstanceType:
    Type: String
    Default: t4g.nano

  VpcId:
    Type: AWS::EC2::VPC::Id

  SubnetId:
    Type: AWS::EC2::Subnet::Id

  BucketName:
    Type: String

  KeyPair:
    Type: String
    Default: ""

  ImageLocationS3Uri:
    Type: String

  CronScriptsS3URI:
    Type: String

  EnvFileS3URI:
    Type: String

  # --- NEW PARAMETERS FOR SSL & ROUTE 53 ---
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: The Route 53 Public Hosted Zone ID for your domain.

  DomainName:
    Type: String
    Description: The fully qualified domain name for the application (e.g., app.yourdomain.com).

  CloudFrontPrefixListId:
    Type: String
    Description: The CloudFront Managed Prefix List ID for your deployment region.

  ACMCertificate:
    Type: String
    Description: ACM Certificate

Conditions:
  HasKey: !Not [!Equals [!Ref KeyPair, ""] ]

Resources:

  # --- UPDATED LOCKED DOWN SECURITY GROUP ---
  TraefikSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for Traefik - Protected by CloudFront
      VpcId: !Ref VpcId

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access (Restrict this CIDR in production if possible)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !Ref CloudFrontPrefixListId
          Description: Restrict inbound HTTP access exclusively to CloudFront Edge nodes
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: Traefik Dashboard (Keep open or restrict to your IP as needed)

  # --- NEW CLOUDFRONT ORIGIN REQUEST POLICY (FOR HOST HEADER FORWARDING) ---
  CloudFrontOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub "${AWS::StackName}-ForwardHostHeaderPolicy"
        Comment: Passes required validation headers to downstream Traefik and Immich
        HeadersConfig:
          HeaderBehavior: whitelist
          Headers:
            - Host
            - Origin
            - Referer
            - Authorization
            - x-api-key
        CookiesConfig:
          CookieBehavior: all
        QueryStringsConfig:
          QueryStringBehavior: all

  # --- NEW CLOUDFRONT DISTRIBUTION ---
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Ref DomainName
        Origins:
          - Id: EC2BackendOrigin
            DomainName: !GetAtt TraefikInstance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
            # --- ADD THIS BLOCK TO FIX PROTOCOL MISMATCH ---
            OriginCustomHeaders:
              - HeaderName: X-Forwarded-Proto
                HeaderValue: https
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          TargetOriginId: EC2BackendOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingDisabled
          OriginRequestPolicyId: !Ref CloudFrontOriginRequestPolicy
        ViewerCertificate:
          AcmCertificateArn: !Ref ACMCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  # --- NEW ROUTE 53 ALIAS RECORD POINTING TO CLOUDFRONT ---
  Route53Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2 # The universal static Canonical Hosted Zone ID for all CloudFront Distributions
        DNSName: !GetAtt CloudFrontDistribution.DomainName

  # --- YOUR EXISTING IAM CONFIGURATION ---
  TraefikInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-Traefik-role"

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:HeadObject
                Resource:
                  - !Sub arn:aws:s3:::${BucketName}/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${BucketName}
        - PolicyName: TraefikECSReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - "ecs:ListClusters"
                  - "ecs:DescribeClusters"
                  - "ecs:ListTasks"
                  - "ecs:DescribeTasks"
                  - "ecs:ListContainerInstances"
                  - "ecs:DescribeContainerInstances"
                  - "ecs:DescribeTaskDefinition"
                  - "ec2:DescribeInstances"
                Resource: "*"
        - PolicyName: ssm-control

          PolicyDocument:
            Version: '2012-10-17'

            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:PutParameter
                Resource: "*"

        - PolicyName: ecs-control

          PolicyDocument:
            Version: '2012-10-17'

            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:ListServices
                  - ecs:UpdateService
                Resource: "*"

  TraefikInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref TraefikInstanceRole

  # --- YOUR EXISTING EC2 INSTANCE DEFINITION ---
  TraefikInstance:
    Type: AWS::EC2::Instance
    Properties:

      ImageId: !Sub "{{resolve:ssm:/aws/service/ecs/optimized-ami/amazon-linux-2023/arm64/recommended/image_id}}"

      InstanceType: !Ref InstanceType

      IamInstanceProfile: !Ref TraefikInstanceProfile

      Tags:
        - Key: Name
          Value: !Sub Traefik

      KeyName: !If
        - HasKey
        - !Ref KeyPair
        - !Ref AWS::NoValue

      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required

      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref TraefikSecurityGroup

      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: 30
            DeleteOnTermination: true
            Encrypted: true

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > >(tee /var/log/traefik.log | logger -t traefik) 2>&1

          until systemctl is-active --quiet docker; do
            sleep 2
          done
          
          dnf install valkey cronie -y
          systemctl enable --now crond
          
          mkdir -p /opt/scheduled
          aws s3 cp "${CronScriptsS3URI}"/microservice-cache-check.sh /opt/scheduled/microservice-cache-check.sh
          chmod +x /opt/scheduled/microservice-cache-check.sh
          aws s3 cp "${CronScriptsS3URI}"/ml-cache-check.sh /opt/scheduled/ml-cache-check.sh
          chmod +x /opt/scheduled/ml-cache-check.sh
          aws s3 cp "${EnvFileS3URI}" /opt/scheduled/var.env
          source /opt/scheduled/var.env   
                  
          aws s3 cp ${ImageLocationS3Uri}/traefik.tar .
          docker load -i traefik.tar
          
          cat >/etc/systemd/system/traefik.service <<'EOF'
          [Unit]
          Description=Traefik
          Requires=docker.service
          After=docker.service

          [Service]
          Type=simple
          Restart=always
          RestartSec=5

          ExecStartPre=-/usr/bin/docker rm -f traefik

          ExecStart=/usr/bin/docker run \
            --name traefik \
            --restart unless-stopped \
            -p 80:80 \
            -p 8080:8080 \
            -e AWS_REGION=${AWS::Region} \
            traefik:latest \
            --api.insecure=true \
            --providers.ecs=true \
            --providers.ecs.clusters=immich-cluster \
            --providers.ecs.region=${AWS::Region} \
            --providers.ecs.exposedByDefault=false \
            --entrypoints.web.address=:80
            --entrypoints.web.forwardedheaders.insecure=true

          ExecStop=/usr/bin/docker stop -t 20 traefik

          ExecStopPost=-/usr/bin/docker rm -f traefik

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reload
          systemctl enable traefik.service
          systemctl start traefik.service
          
          echo "Adding crontab entry"
          echo "*/5 * * * * /opt/scheduled/microservice-cache-check.sh $BACKEND_SSM_PARAM_NAME $IMMICH_ECS_CLUSTER_NAME $IMMICH_ECS_WORKER_SERVICE_NAME $REDIS_HOSTNAME > /var/log/microservice-cache-check.log 2>&1" >> /tmp/mycrontab
          crontab /tmp/mycrontab
          
          crontab -l 
          echo "========= INIT COMPLETE ========"

Outputs:

  InstanceId:
    Value: !Ref TraefikInstance

  PublicIp:
    Value: !GetAtt TraefikInstance.PublicIp

  AvailabilityZone:
    Value: !GetAtt TraefikInstance.AvailabilityZone

  SecurityGroupId:
    Value: !Ref TraefikSecurityGroup

  InstanceProfile:
    Value: !Ref TraefikInstanceProfile

  Role:
    Value: !Ref TraefikInstanceRole

  CloudFrontDomainName:
    Description: The public facing domain for your CloudFront distribution
    Value: !GetAtt CloudFrontDistribution.DomainName

  ApplicationURL:
    Description: Your secure application endpoint
    Value: !Sub "https://${DomainName}"