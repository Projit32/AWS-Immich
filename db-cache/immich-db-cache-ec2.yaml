AWSTemplateFormatVersion: '2010-09-09'
Description: Immich PostgreSQL & Valkey Launch Templates

Parameters:

  VpcId:
    Type: AWS::EC2::VPC::Id

  AllowedCIDR:
    Type: String
    Default: 10.0.0.0/8
    Description: >
      CIDR allowed to reach Postgres port 5432 and SSH. Use your VPC CIDR.

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues:
      - t4g.micro
      - t4g.small
      - t4g.medium
      - t4g.large

  EnvFileS3URI:
    Type: String

  ImageLocationS3Uri:
    Type: String

  KeyPair:
    Type: String
    Default: ""

  PrivateSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Private Subnet for the EC2 instance.

Conditions:
  HasKey: !Not [ !Equals [ !Ref KeyPair, "" ] ]

Resources:

  ###########################################################
  # Security Group
  ###########################################################

  DBCacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Immich DB - Postgres and SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref AllowedCIDR
          Description: Postgres from VPC
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: !Ref AllowedCIDR
          Description: Valkey from VPC
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCIDR
          Description: SSH access
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub immich-db-cache-sg

  ###########################################################
  # IAM
  ###########################################################

  DbRole:
    Type: AWS::IAM::Role
    Properties:

      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  DbInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref DbRole

  ###########################################################
  # State Parameter
  ###########################################################

  StateParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /immich/db-cache/state
      Type: String
      Value: |
        {
          "state":"SPOT_ACTIVE",
        }

  ###########################################################
  # Spot Launch Template
  ###########################################################

  SpotLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate

    Properties:

      LaunchTemplateName:
        !Sub immich-db-cache-spot

      LaunchTemplateData:

        ImageId: !Sub '{{resolve:ssm:/aws/service/ecs/optimized-ami/amazon-linux-2023/arm64/recommended/image_id}}'

        InstanceType: !Ref InstanceType

        KeyName: !If
          - HasKey
          - !Ref KeyPair
          - !Ref AWS::NoValue

        NetworkInterfaces:
          - DeviceIndex: 0
            SubnetId: !Ref PrivateSubnetId
            Groups:
              - !Ref DBCacheSecurityGroup
        
        IamInstanceProfile:
          Arn: !GetAtt DbInstanceProfile.Arn

        MetadataOptions:
          HttpTokens: required

        InstanceMarketOptions:
          MarketType: spot

        TagSpecifications:

          - ResourceType: instance

            Tags:
              - Key: Name
                Value: !Sub immich-db-cache-spot

        UserData:
          Fn::Base64:
            !Sub |
              #!/bin/bash
              set -euo pipefail

              exec > >(tee /var/log/immich-db-init.log | logger -t immich-db-init) 2>&1

              echo "Waiting for EBS attachment..."

              # ── 1. Wait for EBS volume to be attached ──────────────────────────
              DEV="/dev/xvdbb"
              while true; do
                if [ -b "$DEV" ]; then
                  echo "Found EBS volume: $DEV"
                  break
                fi
                sleep 5
              done
              
              
              
              # ── 2. Format only if the volume has no filesystem (new volume) ────

              FS_TYPE=$(blkid -o value -s TYPE "$DEV" || true)

              if [ -z "$FS_TYPE" ]; then
                mkfs.ext4 -L immich-db "$DEV"
              else
                echo "Existing filesystem ($FS_TYPE) — skipping format, data preserved"
              fi



              # ── 3. Mount and persist via fstab ─────────────────────────────────
              mkdir -p /data/postgres

              mount "$DEV" /data/postgres

              UUID=$(blkid -s UUID -o value "$DEV")

              grep -q "$UUID" /etc/fstab || \
              echo "UUID=$UUID /data/postgres ext4 defaults,nofail 0 2" >> /etc/fstab
              
              # Immich postgres image runs as uid 999
              mkdir -p /data/postgres/data
              chown -R 999:999 /data/postgres
            
              mkdir -p /data/valkey
              chown -R 999:999 /data/valkey
            
              echo "Required files made"

              # ── 4. Parse env from S3 ──────────────────────────────────
            
              aws s3 cp "${EnvFileS3URI}" ./var.env
              source ./var.env
              
              DB_USER=$DB_USERNAME
              DB_PASS=$DB_PASSWORD
              DB_NAME=$DB_DATABASE_NAME
            
              echo "DB Credentials found for user : $DB_USER and name $DB_NAME" 
              
      
              # ── 5. Pull Immich Postgres and Valkey image from S3 ──────────────────────────────────
              echo "Downloading images"
            
              aws s3 cp ${ImageLocationS3Uri}/valkey.tar .
              docker load -i valkey.tar
            
              aws s3 cp ${ImageLocationS3Uri}/postgres.tar .
              docker load -i postgres.tar
              
            
              # ── 6. Systemd service for lifecycle management for DB ────────────────────────────────────────

              cat >/etc/systemd/system/immich-db.service <<EOF
              [Unit]
              Description=Immich PostgreSQL
              Requires=docker.service
              After=docker.service network-online.target

              [Service]
              Type=simple
              Restart=always
              RestartSec=10

              ExecStartPre=-/usr/bin/docker rm -f immich-postgres

              ExecStart=/usr/bin/docker run \
                --name immich-postgres \
                --restart=no \
                -p 5432:5432 \
                -e POSTGRES_USER="$DB_USER" \
                -e POSTGRES_PASSWORD="$DB_PASS" \
                -e POSTGRES_DB="$DB_NAME" \
                -v /data/postgres/data:/var/lib/postgresql/data \
                ghcr.io/immich-app/postgres:14-vectorchord0.4.3

              ExecStop=/usr/bin/docker stop -t 60 immich-postgres
              ExecStopPost=/usr/bin/sync
              ExecStopPost=-/usr/bin/docker rm -f immich-postgres

              [Install]
              WantedBy=multi-user.target
              EOF

              systemctl daemon-reload
              systemctl enable immich-db.service
              systemctl start immich-db.service
            
              # ── 7. Systemd service for lifecycle management for cache ────────────────────────────────────────
              
              cat >/etc/systemd/system/valkey.service <<'EOF'
              [Unit]
              Description=Valkey Cache
              Requires=docker.service
              After=docker.service
              
              [Service]
              Type=simple
              Restart=always
              RestartSec=5
              
              ExecStartPre=-/usr/bin/docker rm -f valkey-server
              
              ExecStart=/usr/bin/docker run \
                --name valkey-server \
                --restart always \
                -p 6379:6379 \
                -v /data/valkey:/data \
                valkey/valkey:9 \
                valkey-server --save 900 1 --appendonly yes
              
              ExecStop=/usr/bin/docker stop -t 20 valkey-server
              
              ExecStopPost=-/usr/bin/docker rm -f valkey-server
              
              [Install]
              WantedBy=multi-user.target
              EOF
              
              systemctl daemon-reload
              systemctl enable valkey.service
              systemctl start valkey.service
              echo "INIT Success"

  ###########################################################
  # OnDemand Launch Template
  ###########################################################

  OnDemandLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate

    Properties:

      LaunchTemplateName:
        !Sub immich-db-cache-od

      LaunchTemplateData:

        ImageId: !Sub '{{resolve:ssm:/aws/service/ecs/optimized-ami/amazon-linux-2023/arm64/recommended/image_id}}'

        InstanceType: !Ref InstanceType

        KeyName: !If
          - HasKey
          - !Ref KeyPair
          - !Ref AWS::NoValue

        NetworkInterfaces:
          - DeviceIndex: 0
            SubnetId: !Ref PrivateSubnetId
            Groups:
              - !Ref DBCacheSecurityGroup

        IamInstanceProfile:
          Arn: !GetAtt DbInstanceProfile.Arn

        MetadataOptions:
          HttpTokens: required

        TagSpecifications:

          - ResourceType: instance

            Tags:
              - Key: Name
                Value: !Sub immich-db-cache-od

        UserData:
          Fn::Base64:
            !Sub |
              #!/bin/bash
              set -euo pipefail

              exec > >(tee /var/log/immich-db-init.log | logger -t immich-db-init) 2>&1

              echo "Waiting for EBS attachment..."

              # ── 1. Wait for EBS volume to be attached ──────────────────────────
              DEV="/dev/xvdbb"
              while true; do
                if [ -b "$DEV" ]; then
                  echo "Found EBS volume: $DEV"
                  break
                fi
                sleep 5
              done
              
              
              
              # ── 2. Format only if the volume has no filesystem (new volume) ────

              FS_TYPE=$(blkid -o value -s TYPE "$DEV" || true)

              if [ -z "$FS_TYPE" ]; then
                mkfs.ext4 -L immich-db "$DEV"
              else
                echo "Existing filesystem ($FS_TYPE) — skipping format, data preserved"
              fi



              # ── 3. Mount and persist via fstab ─────────────────────────────────
              mkdir -p /data/postgres

              mount "$DEV" /data/postgres

              UUID=$(blkid -s UUID -o value "$DEV")

              grep -q "$UUID" /etc/fstab || \
              echo "UUID=$UUID /data/postgres ext4 defaults,nofail 0 2" >> /etc/fstab
              
              # Immich postgres image runs as uid 999
              mkdir -p /data/postgres/data
              chown -R 999:999 /data/postgres
            
              mkdir -p /data/valkey
              chown -R 999:999 /data/valkey
            
              echo "Required files made"

              # ── 4. Parse env from S3 ──────────────────────────────────
            
              aws s3 cp "${EnvFileS3URI}" ./var.env
              source ./var.env
              
              DB_USER=$DB_USERNAME
              DB_PASS=$DB_PASSWORD
              DB_NAME=$DB_DATABASE_NAME
            
              echo "DB Credentials found for user : $DB_USER and name $DB_NAME" 
              
      
              # ── 5. Pull Immich Postgres and Valkey image from S3 ──────────────────────────────────
              echo "Downloading images"
            
              aws s3 cp ${ImageLocationS3Uri}/valkey.tar .
              docker load -i valkey.tar
            
              aws s3 cp ${ImageLocationS3Uri}/postgres.tar .
              docker load -i postgres.tar
              
            
              # ── 6. Systemd service for lifecycle management for DB ────────────────────────────────────────

              cat >/etc/systemd/system/immich-db.service <<EOF
              [Unit]
              Description=Immich PostgreSQL
              Requires=docker.service
              After=docker.service network-online.target

              [Service]
