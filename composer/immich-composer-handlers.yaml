AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: Immich Composer Handler

Parameters:

  SpotLaunchTemplateId:
    Type: String

  VolumeId:
    Type: String

  HostedZoneId:
    Type: String

  RecordName:
    Type: String

  StateParameterName:
    Type: String
    Default: /immich/db-cache/state

  ECSClusterName:
    Type: String

Globals:

  Function:
    Runtime: python3.12
    Timeout: 900
    MemorySize: 128
    Architectures:
      - arm64

Resources:

  #########################################################
  # IAM Role
  #########################################################

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:

      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:

        - PolicyName: ec2-control

          PolicyDocument:
            Version: '2012-10-17'

            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: "*"

              - Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:AttachVolume
                  - ec2:DescribeInstances
                  - ec2:DescribeVolumes
                  - ec2:DescribeInstanceStatus
                  - ec2:CreateTags
                Resource: "*"

              - Effect: Allow
                Action:
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                Resource: "*"
        - PolicyName: ecs-control

          PolicyDocument:
            Version: '2012-10-17'

            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:ListServices
                  - ecs:UpdateService
                Resource: "*"

        - PolicyName: route53-control

          PolicyDocument:
            Version: '2012-10-17'

            Statement:
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetChange
                Resource: "*"

        - PolicyName: ssm-control

          PolicyDocument:
            Version: '2012-10-17'

            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:PutParameter
                Resource: "*"

        - PolicyName: eventbridge-control

          PolicyDocument:
            Version: '2012-10-17'

            Statement:
              - Effect: Allow
                Action:
                  - events:EnableRule
                  - events:DisableRule
                Resource: "*"


  #########################################################
  # Composer Lambda
  #########################################################

  ComposerFunction:
    Type: AWS::Serverless::Function

    Properties:

      FunctionName: immich-composer-handler

      CodeUri: .

      Handler: compose_handler.lambda_handler

      Role: !GetAtt LambdaExecutionRole.Arn

      EventInvokeConfig:
        MaximumRetryAttempts: 0
        MaximumEventAgeInSeconds: 60

      Events:
        MorningStart:
          Type: Schedule
          Properties:
            Name: immich-morning-start-rule
            Schedule: cron(30 1 * * ? *)
            Input: '{"start": true}'

        NightStop:
          Type: Schedule
          Properties:
            Name: immich-night-stop-rule
            Schedule: cron(30 16 * * ? *)
            Input: '{"stop": true}'

      Environment:

        Variables:

          VOLUME_ID: !Ref VolumeId

          HOSTED_ZONE_ID: !Ref HostedZoneId

          RECORD_NAME: !Ref RecordName

          STATE_PARAMETER: !Ref StateParameterName

          SPOT_LAUNCH_TEMPLATE_ID: !Ref SpotLaunchTemplateId

          ECS_CLUSTER_NAME: !Ref ECSClusterName

  ComposerLambdaCloudwatchLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: /aws/lambda/immich-composer-handler
      RetentionInDays: 7


Outputs:

  ComposerFunctionArn:
    Value: !GetAtt ComposerFunction.Arn